<main>
  <header>
    <h1>Hello from Zerops!</h1>
    <p class="subtitle">Angular {{ angularVersion }}</p>
  </header>

  <section class="info-grid">
    <div class="info-card">
      <span class="label">Environment</span>
      <span class="value env">{{ appEnv }}</span>
    </div>
    <div class="info-card">
      <span class="label">Built at</span>
      <span class="value">{{ buildTime }}</span>
    </div>
  </section>

  <footer>
    <p>
      Deployed on <a href="https://zerops.io" target="_blank" rel="noopener">Zerops</a>
    </p>
  </footer>
</main>
